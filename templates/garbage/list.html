{% extends "admin_base.html" %}

{% block title %}垃圾清运管理{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-current">垃圾清运管理</span>
{% endblock %}

{% block extra_css %}
<style>
    .badge {
        font-size: 0.8rem;
        padding: 0.4em 0.8em;
        border-radius: 0.5rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="row">
            <div class="col-md-6">
                <h5 class="card-title mb-0"><i class="fa fa-trash-o"></i> 垃圾清运记录</h5>
            </div>
            <div class="col-md-6 text-end">
                <button type="button" class="btn btn-success me-2" id="btnExport">
                    <i class="fa fa-file-excel-o"></i> 导出Excel
                </button>
                <a href="{{ url_for('garbage.create') }}" class="btn btn-primary">
                    <i class="fa fa-plus"></i> 新增记录
                </a>
            </div>
        </div>
    </div>
    <div class="card-body">
        <!-- 筛选表单 -->
        <div class="filter-form mb-4">
            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">供应商</label>
                    <select class="form-select" id="vendorId">
                        <option value="">全部供应商</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label">开始日期</label>
                    <input type="date" class="form-control" id="dateFrom">
                </div>
                <div class="col-md-2">
                    <label class="form-label">结束日期</label>
                    <input type="date" class="form-control" id="dateTo">
                </div>
                <div class="col-md-3">
                    <label class="form-label">搜索</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="searchInput" placeholder="搜索供应商/垃圾类型/备注">
                        <button class="btn btn-primary" id="btnSearch">
                            <i class="fa fa-search"></i>
                        </button>
                    </div>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="button" class="btn btn-outline-secondary w-100" id="btnShowAll">
                        <i class="fa fa-list"></i> 显示全部数据
                    </button>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th class="text-center" style="width: 60px;">序号</th>
                        <th class="text-center" style="width: 120px;">清运日期</th>
                        <th class="text-center" style="width: 180px;">供应商</th>
                        <th class="text-center" style="width: 100px;">垃圾类型</th>
                        <th class="text-center" style="width: 100px;">数量</th>
                        <th class="text-center" style="width: 80px;">单位</th>
                        <th class="text-center" style="width: 100px;">单价</th>
                        <th class="text-center" style="width: 110px;">总金额</th>
                        <th class="text-center" style="width: 80px;">状态</th>
                        <th class="text-center" style="width: 170px;">操作</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr>
                        <td colspan="10" class="text-center text-muted">
                            <i class="fa fa-spinner fa-spin"></i> 加载中...
                        </td>
                    </tr>
                </tbody>
                <tfoot id="tableFoot" style="display: none;">
                    <tr class="summary-row">
                        <td class="text-center" colspan="4">合计</td>
                        <td class="text-end" id="summaryQuantity">0.00</td>
                        <td></td>
                        <td></td>
                        <td class="text-end" id="summaryAmount">¥0.00</td>
                        <td class="text-center" id="summaryCount">0 条</td>
                        <td></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <!-- 分页区域 -->
        <div class="row mt-3">
            <div class="col-md-6">
                <div id="pageInfo" class="text-muted"></div>
            </div>
            <div class="col-md-6">
                <nav>
                    <ul class="pagination justify-content-end mb-0" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function() {
    let currentPage = 1;
    let perPage = 11;
    let totalCount = 0;
    let totalPages = 0;
    let showAll = false;

    // 加载供应商列表
    function loadVendors() {
        $.get('{{ url_for("garbage.vendors") }}', function(res) {
            if (res.success) {
                let html = '<option value="">请选择供应商</option>';
                res.data.forEach(function(vendor) {
                    html += '<option value="' + vendor.vendor_id + '">' + vendor.vendor_name + '</option>';
                });
                $('#vendorId').html(html);
            }
        });
    }

    // 加载数据
    function loadData() {
        const vendorId = $('#vendorId').val();
        const dateFrom = $('#dateFrom').val();
        const dateTo = $('#dateTo').val();
        const search = $('#searchInput').val().trim();

        $('#dataTableBody').html(`
            <tr>
                <td colspan="10" class="text-center text-muted">
                    <i class="fa fa-spinner fa-spin"></i> 加载中...
                </td>
            </tr>
        `);
        $('#tableFoot').hide();

        $.ajax({
            url: '{{ url_for("garbage.garbage_list") }}',
            method: 'GET',
            data: {
                page: currentPage,
                per_page: perPage,
                vendor_id: vendorId,
                date_from: dateFrom,
                date_to: dateTo,
                search: search,
                show_all: showAll
            },
            success: function(res) {
                if (res.success) {
                    totalCount = res.data.total;
                    totalPages = res.data.total_pages;
                    renderTable(res.data.items);
                    renderSummary(res.data.summary);
                    if (showAll) {
                        $('#pagination').empty();
                        $('#pageInfo').text(`共 ${totalCount} 条（全部显示）`);
                    } else {
                        renderPageNav();
                        updatePageInfo();
                    }
                } else {
                    showToast(res.message || '加载失败', 'danger');
                }
            },
            error: function() {
                showToast('网络错误，请重试', 'danger');
            }
        });
    }

    // 渲染表格
    function renderTable(data) {
        const tbody = $('#dataTableBody');
        tbody.empty();

        if (data.length === 0) {
            tbody.html(`
                <tr>
                    <td colspan="10" class="text-center text-muted py-5">
                        <i class="fa fa-inbox fa-3x mb-3"></i>
                        <p>暂无数据</p>
                    </td>
                </tr>
            `);
            return;
        }

        data.forEach(function(item, index) {
            const rowNum = (currentPage - 1) * perPage + index + 1;
            let statusBadge = '';
            switch(item.status) {
                case '待结算':
                    statusBadge = '<span class="badge bg-warning">待结算</span>';
                    break;
                case '已结算':
                    statusBadge = '<span class="badge bg-success">已结算</span>';
                    break;
                default:
                    statusBadge = '<span class="badge bg-secondary">' + item.status + '</span>';
            }

            const html = `
                <tr>
                    <td class="text-center">${rowNum}</td>
                    <td class="text-center">${item.collection_date}</td>
                    <td class="text-center">${item.vendor_name}</td>
                    <td class="text-center">${item.garbage_type}</td>
                    <td class="text-end">${item.amount.toFixed(2)}</td>
                    <td class="text-center">${item.unit}</td>
                    <td class="text-end">¥${item.unit_price.toFixed(2)}</td>
                    <td class="text-end">¥${item.total_amount.toFixed(2)}</td>
                    <td class="text-center">${statusBadge}</td>
                    <td class="text-center" style="white-space: nowrap;">
                        <a href="/garbage/detail/${item.collection_id}" class="btn btn-sm btn-outline-info me-1" title="查看详情">
                            <i class="fa fa-eye"></i> 详情
                        </a>
                        <a href="/garbage/edit/${item.collection_id}" class="btn btn-sm btn-outline-primary me-1" title="编辑">
                            <i class="fa fa-edit"></i> 编辑
                        </a>
                        <button class="btn btn-sm btn-outline-danger btn-delete" data-id="${item.collection_id}" title="删除">
                            <i class="fa fa-trash"></i> 删除
                        </button>
                    </td>
                </tr>
            `;
            tbody.append(html);
        });
    }

    // 渲染合计行
    function renderSummary(summary) {
        if (!summary || summary.total_count === 0) {
            $('#tableFoot').hide();
            return;
        }
        $('#summaryQuantity').text(summary.total_quantity.toFixed(2));
        $('#summaryAmount').text('¥' + summary.total_amount.toFixed(2));
        $('#summaryCount').text(summary.total_count + ' 条');
        $('#tableFoot').show();
    }

    // 渲染分页
    function renderPageNav() {
        renderPagination('#pagination', { current_page: currentPage, total_pages: totalPages, total: totalCount }, function(page) {
            currentPage = page;
            loadData();
        });
    }

    // 更新分页信息
    function updatePageInfo() {
        const start = (currentPage - 1) * perPage + 1;
        const end = Math.min(currentPage * perPage, totalCount);

        if (totalCount === 0) {
            $('#pageInfo').text('暂无数据');
        } else {
            $('#pageInfo').text(`显示 ${start}-${end} 条，共 ${totalCount} 条`);
        }
    }

    // 搜索按钮点击事件
    bindSearch('searchInput', 'btnSearch', function() {
        currentPage = 1;
        showAll = false;
        updateShowAllBtn();
        loadData();
    });

    // 显示全部数据按钮点击事件
    $('#btnShowAll').click(function() {
        showAll = !showAll;
        if (showAll) {
            currentPage = 1;
        }
        updateShowAllBtn();
        loadData();
    });

    function updateShowAllBtn() {
        if (showAll) {
            $('#btnShowAll').removeClass('btn-outline-secondary').addClass('btn-secondary');
            $('#btnShowAll').html('<i class="fa fa-list"></i> 分页显示');
        } else {
            $('#btnShowAll').removeClass('btn-secondary').addClass('btn-outline-secondary');
            $('#btnShowAll').html('<i class="fa fa-list"></i> 显示全部数据');
        }
    }

    // 筛选条件变化事件
    $('#vendorId, #dateFrom, #dateTo').change(function() {
        currentPage = 1;
        showAll = false;
        updateShowAllBtn();
        loadData();
    });

    // 导出 Excel
    $('#btnExport').click(function() {
        const vendorId = $('#vendorId').val();
        const dateFrom = $('#dateFrom').val();
        const dateTo = $('#dateTo').val();
        const search = $('#searchInput').val().trim();

        const params = new URLSearchParams();
        if (vendorId) params.set('vendor_id', vendorId);
        if (dateFrom) params.set('date_from', dateFrom);
        if (dateTo) params.set('date_to', dateTo);
        if (search) params.set('search', search);

        window.location.href = '{{ url_for("garbage.export") }}?' + params.toString();
    });

    // 删除按钮点击事件
    $(document).on('click', '.btn-delete', function() {
        const collectionId = $(this).data('id');
        if (confirm('确定要删除这条垃圾清运记录吗？')) {
            $.ajax({
                url: '{{ url_for("garbage.delete", collection_id=0) }}'.replace('/0', '/' + collectionId),
                method: 'POST',
                headers: { 'X-CSRFToken': getCSRFToken() },
                success: function(res) {
                    if (res.success) {
                        showToast('删除成功', 'success');
                        loadData();
                    } else {
                        showToast(res.message || '删除失败', 'danger');
                    }
                },
                error: function(xhr) {
                    var msg = '网络错误，请重试';
                    try { msg = xhr.responseJSON.message || msg; } catch(e) {}
                    showToast(msg, 'danger');
                }
            });
        }
    });

    // 初始化
    loadVendors();
    loadData();
});
</script>
{% endblock %}
