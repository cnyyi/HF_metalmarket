{% extends "admin_base.html" %}

{% block title %}垃圾清运记录详情{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<a href="{{ url_for('garbage.index') }}" class="breadcrumb-chip">垃圾清运管理</a>
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-current">记录详情</span>
{% endblock %}

{% block extra_css %}
<style>
    .detail-item {
        margin-bottom: 12px;
    }
    .detail-label {
        font-weight: 600;
        color: var(--color-text-muted);
    }
    .detail-value {
        font-size: 1.05rem;
    }
</style>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="row">
            <div class="col-md-6">
                <h5 class="card-title mb-0"><i class="fa fa-eye"></i> 垃圾清运记录详情</h5>
            </div>
            <div class="col-md-6 text-end">
                <a href="{{ url_for('garbage.index') }}" class="btn btn-secondary me-2">
                    <i class="fa fa-arrow-left"></i> 返回列表
                </a>
                <a id="btnEdit" href="#" class="btn btn-primary">
                    <i class="fa fa-edit"></i> 编辑
                </a>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div id="detailContent">
            <div class="text-center py-5">
                <i class="fa fa-spinner fa-spin fa-3x text-muted"></i>
                <p class="mt-2 text-muted">加载中...</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function() {
    const collectionId = '{{ collection_id }}';
    $('#btnEdit').attr('href', '{{ url_for("garbage.edit", collection_id=0) }}'.replace('/0', '/' + collectionId));

    // 加载详情数据
    function loadDetailData() {
        $.get('{{ url_for("garbage.detail_data", collection_id=0) }}'.replace('/0', '/' + collectionId), function(res) {
            if (res.success) {
                renderDetail(res.data);
            } else {
                $('#detailContent').html(`
                    <div class="text-center py-5">
                        <i class="fa fa-exclamation-triangle fa-3x text-danger"></i>
                        <p class="mt-2 text-danger">${res.message || '加载失败'}</p>
                        <a href="{{ url_for('garbage.index') }}" class="btn btn-primary mt-2">
                            <i class="fa fa-arrow-left"></i> 返回列表
                        </a>
                    </div>
                `);
            }
        });
    }

    // 渲染详情
    function renderDetail(data) {
        let statusBadge = '';
        switch(data.status) {
            case '待结算':
                statusBadge = '<span class="status-badge bg-warning text-dark">待结算</span>';
                break;
            case '已结算':
                statusBadge = '<span class="status-badge bg-success">已结算</span>';
                break;
            default:
                statusBadge = '<span class="status-badge bg-secondary">' + data.status + '</span>';
        }

        const payableLink = data.payable_id
            ? '<a href="{{ url_for("finance.payable_detail", payable_id=0) }}'.replace('/0', '/' + data.payable_id) + '" target="_blank" class="text-primary">应付账款 #' + data.payable_id + '</a>'
            : '—';

        const html = `
            <div class="row">
                <div class="col-md-6">
                    <div class="detail-item">
                        <span class="detail-label">清运日期：</span>
                        <span class="detail-value">${data.collection_date}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">供应商：</span>
                        <span class="detail-value">${data.vendor_name}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">垃圾类型：</span>
                        <span class="detail-value">${data.garbage_type}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">数量：</span>
                        <span class="detail-value">${data.amount.toFixed(2)} ${data.unit}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">单价：</span>
                        <span class="detail-value">¥${data.unit_price.toFixed(2)}</span>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="detail-item">
                        <span class="detail-label">总金额：</span>
                        <span class="detail-value fw-bold text-primary">¥${data.total_amount.toFixed(2)}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">状态：</span>
                        <span class="detail-value">${statusBadge}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">关联应付账款：</span>
                        <span class="detail-value">${payableLink}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">创建人：</span>
                        <span class="detail-value">${data.create_user_name || '—'}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">创建时间：</span>
                        <span class="detail-value">${data.create_time}</span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">备注：</span>
                        <span class="detail-value">${data.description || '无'}</span>
                    </div>
                </div>
            </div>
        `;

        $('#detailContent').html(html);
    }

    // 初始化
    loadDetailData();
});
</script>
{% endblock %}
