{% extends "merchant_base.html" %}

{% block title %}过磅记录{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>过磅时间</th>
                        <th>品名</th>
                        <th>毛重(吨)</th>
                        <th>皮重(吨)</th>
                        <th>净重(吨)</th>
                        <th>单价</th>
                        <th>金额</th>
                        <th>车牌号</th>
                        <th>操作员</th>
                    </tr>
                </thead>
                <tbody id="scaleTableBody">
                    <tr><td colspan="9" class="text-center text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <nav aria-label="Page navigation" id="paginationNav" style="display:none;">
            <ul class="pagination justify-content-center" id="paginationList"></ul>
        </nav>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var currentPage = 1;
var perPage = 10;

function loadScaleRecords(page) {
    if (!page) page = 1;
    currentPage = page;
    $.ajax({
        url: '{{ url_for("portal.api_scale_records") }}',
        type: 'GET',
        data: { page: page, per_page: perPage },
        success: function(resp) {
            if (resp.success) {
                renderTable(resp.data);
            } else {
                $('#scaleTableBody').html('<tr><td colspan="9" class="text-center text-danger">' + (resp.message || '获取数据失败') + '</td></tr>');
            }
        }
    });
}

function renderTable(data) {
    var items = data.items;
    var tbody = $('#scaleTableBody');
    if (!items || items.length === 0) {
        tbody.html('<tr><td colspan="9" class="text-center text-muted">暂无过磅记录</td></tr>');
        $('#paginationNav').hide();
        return;
    }
    var html = '';
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        html += '<tr>';
        html += '<td>' + item.scale_time + '</td>';
        html += '<td>' + escapeHtml(item.product_name || '-') + '</td>';
        html += '<td class="text-end">' + item.gross_weight.toFixed(2) + '</td>';
        html += '<td class="text-end">' + item.tare_weight.toFixed(2) + '</td>';
        html += '<td class="text-end fw-bold">' + item.net_weight.toFixed(2) + '</td>';
        html += '<td class="text-end">¥' + formatNumber(item.unit_price) + '</td>';
        html += '<td class="text-end">¥' + formatNumber(item.total_amount) + '</td>';
        html += '<td>' + escapeHtml(item.license_plate || '-') + '</td>';
        html += '<td>' + escapeHtml(item.operator) + '</td>';
        html += '</tr>';
    }
    tbody.html(html);
    renderPagination(data);
}

function renderPagination(data) {
    var totalPages = data.total_pages;
    var currentPage = data.current_page;
    if (totalPages <= 1) { $('#paginationNav').hide(); return; }
    var html = '<li class="page-item ' + (currentPage === 1 ? 'disabled' : '') + '">';
    html += '<a class="page-link" href="#" data-page="' + (currentPage - 1) + '">上一页</a></li>';
    for (var i = 1; i <= totalPages; i++) {
        html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '">';
        html += '<a class="page-link" href="#" data-page="' + i + '">' + i + '</a></li>';
    }
    html += '<li class="page-item ' + (currentPage === totalPages ? 'disabled' : '') + '">';
    html += '<a class="page-link" href="#" data-page="' + (currentPage + 1) + '">下一页</a></li>';
    $('#paginationList').html(html);
    $('#paginationNav').show();
}

$(document).ready(function() {
    loadScaleRecords(1);
    $(document).on('click', '#paginationList .page-link', function(e) {
        e.preventDefault();
        var page = $(this).data('page');
        if (page && page >= 1) loadScaleRecords(page);
    });
});
</script>
{% endblock %}
