{% extends "merchant_base.html" %}

{% block title %}水电抄表{% endblock %}

{% block page_header %}
    <i class="fa fa-tint"></i> 水电抄表
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>抄表日期</th>
                        <th>类型</th>
                        <th>表号</th>
                        <th>上期读数</th>
                        <th>本期读数</th>
                        <th>用量</th>
                        <th>单价</th>
                        <th>金额</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="utilityTableBody">
                    <tr><td colspan="9" class="text-center text-muted">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <nav aria-label="Page navigation" id="paginationNav" style="display:none;">
            <ul class="pagination justify-content-center" id="paginationList"></ul>
        </nav>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var currentPage = 1;
var perPage = 10;

function getTypeBadge(type) {
    if (type === '水表' || type === 'water') return '<span class="badge bg-info">水费</span>';
    return '<span class="badge bg-warning">电费</span>';
}

function loadUtilityReadings(page) {
    if (!page) page = 1;
    currentPage = page;
    $.ajax({
        url: '{{ url_for("portal.api_utility_readings") }}',
        type: 'GET',
        data: { page: page, per_page: perPage },
        success: function(resp) {
            if (resp.success) {
                renderTable(resp.data);
            } else {
                $('#utilityTableBody').html('<tr><td colspan="9" class="text-center text-danger">' + (resp.message || '获取数据失败') + '</td></tr>');
            }
        }
    });
}

function renderTable(data) {
    var items = data.items;
    var tbody = $('#utilityTableBody');
    if (!items || items.length === 0) {
        tbody.html('<tr><td colspan="9" class="text-center text-muted">暂无抄表记录</td></tr>');
        $('#paginationNav').hide();
        return;
    }
    var html = '';
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        html += '<tr>';
        html += '<td>' + item.reading_date + '</td>';
        html += '<td>' + getTypeBadge(item.reading_type) + '</td>';
        html += '<td>' + escapeHtml(item.meter_number || '-') + '</td>';
        html += '<td class="text-end">' + item.previous_reading.toFixed(2) + '</td>';
        html += '<td class="text-end">' + item.current_reading.toFixed(2) + '</td>';
        html += '<td class="text-end fw-bold">' + item.usage.toFixed(2) + '</td>';
        html += '<td class="text-end">¥' + formatNumber(item.unit_price) + '</td>';
        html += '<td class="text-end">¥' + formatNumber(item.total_amount) + '</td>';
        html += '<td><span class="badge bg-secondary">' + escapeHtml(item.status) + '</span></td>';
        html += '</tr>';
    }
    tbody.html(html);
    renderPagination(data);
}

function renderPagination(data) {
    var totalPages = data.total_pages;
    var currentPage = data.current_page;
    if (totalPages <= 1) { $('#paginationNav').hide(); return; }
    var html = '<li class="page-item ' + (currentPage === 1 ? 'disabled' : '') + '">';
    html += '<a class="page-link" href="#" data-page="' + (currentPage - 1) + '">上一页</a></li>';
    for (var i = 1; i <= totalPages; i++) {
        html += '<li class="page-item ' + (i === currentPage ? 'active' : '') + '">';
        html += '<a class="page-link" href="#" data-page="' + i + '">' + i + '</a></li>';
    }
    html += '<li class="page-item ' + (currentPage === totalPages ? 'disabled' : '') + '">';
    html += '<a class="page-link" href="#" data-page="' + (currentPage + 1) + '">下一页</a></li>';
    $('#paginationList').html(html);
    $('#paginationNav').show();
}

$(document).ready(function() {
    loadUtilityReadings(1);
    $(document).on('click', '#paginationList .page-link', function(e) {
        e.preventDefault();
        var page = $(this).data('page');
        if (page && page >= 1) loadUtilityReadings(page);
    });
});
</script>
{% endblock %}
