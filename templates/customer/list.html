{% extends "admin_base.html" %}

{% block title %}往来客户管理{% endblock %}

{% block extra_css %}
<style>
.customer-info { font-size: 0.8rem; color: #6c757d; }
</style>
{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-chip">财务管理</span>
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-current">往来客户</span>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="row">
            <div class="col-md-6">
                <h5 class="card-title mb-0">客户列表</h5>
            </div>
            <div class="col-md-6 text-end">
                <button type="button" class="btn btn-primary" id="btnAddCustomer">
                    <i class="fa fa-plus"></i> 添加客户
                </button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="搜索客户名称/联系人/电话">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="statusFilter">
                    <option value="">全部状态</option>
                    <option value="正常">正常</option>
                    <option value="停用">停用</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-primary" id="btnSearch">
                    <i class="fa fa-search"></i> 搜索
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>客户名称</th>
                        <th>简称</th>
                        <th>联系人</th>
                        <th>联系电话</th>
                        <th>客户类型</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody">
                    <tr>
                        <td colspan="9" class="text-center text-muted">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav aria-label="Page navigation" id="paginationNav" style="display:none;">
            <ul class="pagination justify-content-center" id="paginationList">
            </ul>
        </nav>
    </div>
</div>

<!-- 添加/编辑客户弹窗 -->
<div class="modal fade" id="customerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="customerModalLabel">
                    <i class="fa fa-plus-circle"></i> 添加客户
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="customerForm">
                    <input type="hidden" id="editCustomerId">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">客户名称 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="customerNameInput" placeholder="请输入客户名称" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">简称</label>
                            <input type="text" class="form-control" id="shortNameInput" placeholder="请输入简称（可选）">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">联系人</label>
                            <input type="text" class="form-control" id="contactPersonInput" placeholder="请输入联系人">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">联系电话</label>
                            <input type="text" class="form-control" id="phoneInput" placeholder="请输入联系电话">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">客户类型</label>
                            <select class="form-select" id="customerTypeInput">
                                <option value="">请选择</option>
                                <option value="供应商">供应商</option>
                                <option value="服务商">服务商</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">税号</label>
                            <input type="text" class="form-control" id="taxNumberInput" placeholder="请输入税号（可选）">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">地址</label>
                            <input type="text" class="form-control" id="addressInput" placeholder="请输入地址">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label fw-bold">经营范围</label>
                            <input type="text" class="form-control" id="businessScopeInput" placeholder="请输入经营范围（可选）">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-12">
                            <label class="form-label">备注</label>
                            <textarea class="form-control" id="descriptionInput" rows="3" placeholder="请输入备注信息（可选）"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btnSubmitCustomer">
                    <i class="fa fa-check"></i> 确认保存
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var currentPage = 1;
var perPage = 10;

function loadCustomers(page) {
    if (!page) page = 1;
    currentPage = page;
    var search = $('#searchInput').val().trim();
    var status = $('#statusFilter').val();

    $.ajax({
        url: '/customer/api/list',
        type: 'GET',
        data: { page: page, per_page: perPage, search: search, status: status },
        success: function(resp) {
            if (resp.success) {
                renderTable(resp.data);
            } else {
                $('#customerTableBody').html('<tr><td colspan="9" class="text-center text-danger">' + (resp.message || '获取数据失败') + '</td></tr>');
            }
        },
        error: function() {
            $('#customerTableBody').html('<tr><td colspan="9" class="text-center text-danger">网络错误</td></tr>');
        }
    });
}

function renderTable(data) {
    var items = data.items;
    var tbody = $('#customerTableBody');
    if (!items || items.length === 0) {
        tbody.html('<tr><td colspan="9" class="text-center text-muted">暂无数据</td></tr>');
        $('#paginationNav').hide();
        return;
    }
    var html = '';
    var startIndex = (data.current_page - 1) * perPage;
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var rowNo = startIndex + i + 1;
        var statusClass = item.status === '正常' ? 'status-active' : 'status-inactive';
        html += '<tr>';
        html += '<td>' + rowNo + '</td>';
        html += '<td>' + escapeHtml(item.customer_name) + '</td>';
        html += '<td>' + escapeHtml(item.short_name) + '</td>';
        html += '<td>' + escapeHtml(item.contact_person) + '</td>';
        html += '<td>' + escapeHtml(item.phone) + '</td>';
        html += '<td>' + escapeHtml(item.customer_type) + '</td>';
        html += '<td><span class="status-badge ' + statusClass + '">' + escapeHtml(item.status) + '</span></td>';
        html += '<td>' + item.create_time + '</td>';
        html += '<td class="table-actions">';
        html += '<button class="btn btn-sm btn-outline-primary me-1 btn-edit" data-id="' + item.customer_id + '"><i class="fa fa-edit"></i> 编辑</button>';
        html += '<button class="btn btn-sm btn-outline-danger btn-delete" data-id="' + item.customer_id + '" data-name="' + escapeHtml(item.customer_name) + '"><i class="fa fa-trash"></i> 删除</button>';
        html += '</td></tr>';
    }
    tbody.html(html);
    renderPagination('#paginationList', data, function(page) { loadCustomers(page); });
}

function openAddModal() {
    $('#editCustomerId').val('');
    $('#customerForm')[0].reset();
    $('#customerModalLabel').html('<i class="fa fa-plus-circle"></i> 添加客户');
    var modal = new bootstrap.Modal(document.getElementById('customerModal'));
    modal.show();
}

function openEditModal(id) {
    $.ajax({
        url: '/customer/api/detail/' + id,
        type: 'GET',
        success: function(resp) {
            if (!resp.success) { showToast('error', resp.message); return; }
            var d = resp.data;
            $('#editCustomerId').val(d.customer_id);
            $('#customerNameInput').val(d.customer_name);
            $('#shortNameInput').val(d.short_name);
            $('#contactPersonInput').val(d.contact_person);
            $('#phoneInput').val(d.phone);
            $('#customerTypeInput').val(d.customer_type);
            $('#taxNumberInput').val(d.tax_number);
            $('#addressInput').val(d.address);
            $('#businessScopeInput').val(d.business_scope);
            $('#descriptionInput').val(d.description);
            $('#customerModalLabel').html('<i class="fa fa-edit"></i> 编辑客户');
            var modal = new bootstrap.Modal(document.getElementById('customerModal'));
            modal.show();
        },
        error: function() { showToast('error', '获取客户信息失败'); }
    });
}

function submitCustomer() {
    var id = $('#editCustomerId').val();
    var data = {
        customer_name: $('#customerNameInput').val().trim(),
        short_name: $('#shortNameInput').val().trim(),
        contact_person: $('#contactPersonInput').val().trim(),
        phone: $('#phoneInput').val().trim(),
        customer_type: $('#customerTypeInput').val(),
        tax_number: $('#taxNumberInput').val().trim(),
        address: $('#addressInput').val().trim(),
        business_scope: $('#businessScopeInput').val().trim(),
        description: $('#descriptionInput').val().trim()
    };

    if (!data.customer_name) { showToast('warning', '请输入客户名称'); return; }

    var btn = $('#btnSubmitCustomer');
    btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> 保存中...');

    var url = id ? '/customer/api/edit/' + id : '/customer/api/add';

    $.ajax({
        url: url,
        type: 'POST',
        contentType: 'application/json',
        headers: { 'X-CSRFToken': getCSRFToken() },
        data: JSON.stringify(data),
        success: function(resp) {
            if (resp.success) {
                bootstrap.Modal.getInstance(document.getElementById('customerModal')).hide();
                loadCustomers(id ? currentPage : 1);
                showToast('success', resp.message);
            } else {
                showToast('error', resp.message || '保存失败');
            }
        },
        error: function(xhr) {
            var resp = xhr.responseJSON;
            showToast('error', resp ? resp.message : '网络错误');
        },
        complete: function() {
            btn.prop('disabled', false).html('<i class="fa fa-check"></i> 确认保存');
        }
    });
}

function deleteCustomer(id, name) {
    if (!confirm('确定要删除客户「' + name + '」吗？')) return;

    $.ajax({
        url: '/customer/api/delete/' + id,
        type: 'POST',
        headers: { 'X-CSRFToken': getCSRFToken() },
        success: function(resp) {
            if (resp.success) {
                loadCustomers(currentPage);
                showToast('success', resp.message);
            } else {
                showToast('error', resp.message || '删除失败');
            }
        },
        error: function(xhr) {
            var resp = xhr.responseJSON;
            showToast('error', resp ? resp.message : '网络错误');
        }
    });
}

$(document).ready(function() {
    loadCustomers(1);
    bindSearch('searchInput', 'btnSearch', function() { loadCustomers(1); });
    $('#statusFilter').on('change', function() { loadCustomers(1); });
    $('#btnAddCustomer').on('click', openAddModal);
    $(document).on('click', '.btn-edit', function() { openEditModal($(this).data('id')); });
    $(document).on('click', '.btn-delete', function() { deleteCustomer($(this).data('id'), $(this).data('name')); });
    $('#btnSubmitCustomer').on('click', submitCustomer);
});
</script>
{% endblock %}
