{% extends "admin_base.html" %}

{% block title %}宿舍房间管理{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-chip">宿舍管理</span>
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-current">宿舍房间</span>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="row">
            <div class="col-md-6">
                <h5 class="card-title mb-0">宿舍房间列表</h5>
            </div>
            <div class="col-md-6 text-end">
                <button type="button" class="btn btn-primary" id="btnAddRoom">
                    <i class="fa fa-plus"></i> 新增房间
                </button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="搜索房间号/电表号">
                </div>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="statusFilter">
                    <option value="">全部状态</option>
                    <option value="空闲">空闲</option>
                    <option value="已住">已住</option>
                    <option value="维修中">维修中</option>
                </select>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="roomTypeFilter">
                    <option value="">全部房型</option>
                    <option value="单间">单间</option>
                    <option value="标间">标间</option>
                    <option value="套间">套间</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-primary" id="btnSearch">
                    <i class="fa fa-search"></i> 搜索
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>房间号</th>
                        <th>房型</th>
                        <th>面积(㎡)</th>
                        <th>月租金</th>
                        <th>水费定额</th>
                        <th>电费单价</th>
                        <th>电表号</th>
                        <th>状态</th>
                        <th>当前租户</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="roomTableBody">
                    <tr>
                        <td colspan="11" class="text-center text-muted">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav aria-label="Page navigation" id="paginationNav" style="display:none;">
            <ul class="pagination justify-content-center" id="paginationList"></ul>
        </nav>
    </div>
</div>

<!-- 新增/编辑房间弹窗 -->
<div class="modal fade" id="roomModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="roomModalTitle">新增房间</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editRoomId">
                <div class="mb-3">
                    <label class="form-label">房间编号 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="roomNumber" placeholder="如：宿舍101">
                </div>
                <div class="mb-3">
                    <label class="form-label">房型</label>
                    <select class="form-select" id="roomType">
                        <option value="单间">单间</option>
                        <option value="标间">标间</option>
                        <option value="套间">套间</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">面积(㎡)</label>
                    <input type="number" class="form-control" id="area" step="0.01" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">月租金(元) <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="monthlyRent" step="0.01" min="0" value="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">水费定额(元/月)</label>
                    <input type="number" class="form-control" id="waterQuota" step="0.01" min="0" value="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">电费单价(元/度)</label>
                    <input type="number" class="form-control" id="electricityUnitPrice" step="0.01" min="0" value="1.0">
                </div>
                <div class="mb-3">
                    <label class="form-label">电表号</label>
                    <input type="text" class="form-control" id="meterNumber" placeholder="电表编号">
                </div>
                <div class="mb-3">
                    <label class="form-label">备注</label>
                    <textarea class="form-control" id="description" rows="2"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btnSaveRoom">保存</button>
            </div>
        </div>
    </div>
</div>

<script>
$(function() {
    let currentPage = 1;

    function loadRooms(page) {
        currentPage = page || 1;
        $.get('{{ url_for("dorm.rooms_list") }}', {
            page: currentPage,
            per_page: 10,
            search: $('#searchInput').val().trim(),
            status: $('#statusFilter').val(),
            room_type: $('#roomTypeFilter').val()
        }, function(res) {
            if (!res.success) return showToast(res.message, 'danger');
            var data = res.data;
            var html = '';
            if (data.items.length === 0) {
                html = '<tr><td colspan="11" class="text-center text-muted">暂无数据</td></tr>';
            } else {
                data.items.forEach(function(item, i) {
                    var statusBadge = getStatusBadge(item.status);
                    html += '<tr>' +
                        '<td>' + ((currentPage - 1) * 10 + i + 1) + '</td>' +
                        '<td><strong>' + escapeHtml(item.room_number) + '</strong></td>' +
                        '<td>' + escapeHtml(item.room_type) + '</td>' +
                        '<td>' + (item.area ? item.area : '-') + '</td>' +
                        '<td>' + item.monthly_rent.toFixed(2) + '</td>' +
                        '<td>' + item.water_quota.toFixed(2) + '</td>' +
                        '<td>' + item.electricity_unit_price.toFixed(2) + '</td>' +
                        '<td>' + escapeHtml(item.meter_number) + '</td>' +
                        '<td>' + statusBadge + '</td>' +
                        '<td>' + (item.tenant_name ? escapeHtml(item.tenant_name) : '<span class="text-muted">-</span>') + '</td>' +
                        '<td>' +
                            '<button class="btn btn-sm btn-outline-primary me-1" onclick="editRoom(' + item.room_id + ')"><i class="fa fa-edit"></i> 编辑</button>' +
                            (item.status === '空闲' ? '<button class="btn btn-sm btn-outline-success me-1" onclick="quickCheckIn(' + item.room_id + ')"><i class="fa fa-sign-in"></i> 入住</button>' : '') +
                            (item.status === '空闲' ? '<button class="btn btn-sm btn-outline-danger" onclick="deleteRoom(' + item.room_id + ')"><i class="fa fa-trash"></i> 删除</button>' : '') +
                        '</td>' +
                    '</tr>';
                });
            }
            $('#roomTableBody').html(html);
            renderPagination(data);
        });
    }

    function getStatusBadge(status) {
        var map = {
            '空闲': '<span class="badge bg-success">空闲</span>',
            '已住': '<span class="badge bg-primary">已住</span>',
            '维修中': '<span class="badge bg-warning text-dark">维修中</span>'
        };
        return map[status] || '<span class="badge bg-secondary">' + escapeHtml(status) + '</span>';
    }

    function renderPagination(data) {
        if (data.total_pages <= 1) {
            $('#paginationNav').hide();
            return;
        }
        $('#paginationNav').show();
        var html = '';
        html += '<li class="page-item ' + (data.current_page <= 1 ? 'disabled' : '') + '"><a class="page-link" href="#" onclick="loadRooms(' + (data.current_page - 1) + ');return false;">&laquo;</a></li>';
        for (var i = 1; i <= data.total_pages; i++) {
            html += '<li class="page-item ' + (i === data.current_page ? 'active' : '') + '"><a class="page-link" href="#" onclick="loadRooms(' + i + ');return false;">' + i + '</a></li>';
        }
        html += '<li class="page-item ' + (data.current_page >= data.total_pages ? 'disabled' : '') + '"><a class="page-link" href="#" onclick="loadRooms(' + (data.current_page + 1) + ');return false;">&raquo;</a></li>';
        $('#paginationList').html(html);
    }

    // 搜索
    $('#btnSearch').click(function() { loadRooms(1); });
    $('#searchInput').keypress(function(e) { if (e.which === 13) loadRooms(1); });

    // 新增房间
    $('#btnAddRoom').click(function() {
        $('#editRoomId').val('');
        $('#roomModalTitle').text('新增房间');
        $('#roomNumber').val('').prop('disabled', false);
        $('#roomType').val('单间');
        $('#area').val('');
        $('#monthlyRent').val('0');
        $('#waterQuota').val('0');
        $('#electricityUnitPrice').val('1.0');
        $('#meterNumber').val('');
        $('#description').val('');
        new bootstrap.Modal($('#roomModal')[0]).show();
    });

    // 保存房间
    $('#btnSaveRoom').click(function() {
        var data = {
            room_number: $('#roomNumber').val().trim(),
            room_type: $('#roomType').val(),
            area: $('#area').val() || null,
            monthly_rent: parseFloat($('#monthlyRent').val()) || 0,
            water_quota: parseFloat($('#waterQuota').val()) || 0,
            electricity_unit_price: parseFloat($('#electricityUnitPrice').val()) || 1.0,
            meter_number: $('#meterNumber').val().trim(),
            description: $('#description').val().trim()
        };

        if (!data.room_number) { showToast('请输入房间编号', 'warning'); return; }

        var editId = $('#editRoomId').val();
        var url = editId ? '{{ url_for("dorm.rooms_edit", room_id=0) }}'.replace('/0', '/' + editId) : '{{ url_for("dorm.rooms_add") }}';

        $.ajax({
            url: url,
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(data),
            success: function(res) {
                if (res.success) {
                    showToast(res.message, 'success');
                    bootstrap.Modal.getInstance($('#roomModal')[0]).hide();
                    loadRooms(currentPage);
                } else {
                    showToast(res.message, 'danger');
                }
            },
            error: function(xhr) {
                showToast(xhr.responseJSON?.message || '操作失败', 'danger');
            }
        });
    });

    // 编辑房间
    window.editRoom = function(roomId) {
        $.get('{{ url_for("dorm.rooms_list") }}', { per_page: 100 }, function(res) {
            if (!res.success) return;
            var item = res.data.items.find(function(r) { return r.room_id === roomId; });
            if (!item) return;
            $('#editRoomId').val(roomId);
            $('#roomModalTitle').text('编辑房间');
            $('#roomNumber').val(item.room_number).prop('disabled', true);
            $('#roomType').val(item.room_type);
            $('#area').val(item.area || '');
            $('#monthlyRent').val(item.monthly_rent);
            $('#waterQuota').val(item.water_quota);
            $('#electricityUnitPrice').val(item.electricity_unit_price);
            $('#meterNumber').val(item.meter_number);
            $('#description').val(item.description);
            new bootstrap.Modal($('#roomModal')[0]).show();
        });
    };

    // 删除房间
    window.deleteRoom = function(roomId) {
        if (!confirm('确定要删除该房间吗？')) return;
        $.ajax({
            url: '{{ url_for("dorm.rooms_edit", room_id=0) }}'.replace('/0', '/' + roomId),
            method: 'DELETE',
            success: function(res) {
                if (res.success) { showToast(res.message, 'success'); loadRooms(currentPage); }
                else { showToast(res.message, 'danger'); }
            }
        });
        // 用 POST 方式调删除
        $.ajax({
            url: '{{ url_for("dorm.rooms_delete", room_id=0) }}'.replace('/0', '/' + roomId),
            method: 'POST',
            success: function(res) {
                if (res.success) { showToast(res.message, 'success'); loadRooms(currentPage); }
                else { showToast(res.message, 'danger'); }
            },
            error: function(xhr) { showToast(xhr.responseJSON?.message || '删除失败', 'danger'); }
        });
    };

    // 快速入住
    window.quickCheckIn = function(roomId) {
        window.location.href = '{{ url_for("dorm.occupancy") }}?room_id=' + roomId;
    };

    window.loadRooms = loadRooms;
    loadRooms(1);
});
</script>
{% endblock %}
