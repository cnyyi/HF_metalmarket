{% extends "admin_base.html" %}

{% block title %}费用单管理{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<a href="{{ url_for('expense.index') }}" class="breadcrumb-chip">费用单</a>
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-current">费用单列表</span>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="row">
            <div class="col-md-6">
                <h5 class="card-title mb-0">费用单列表</h5>
            </div>
            <div class="col-md-6 text-end">
                <a href="{{ url_for('expense.create') }}" class="btn btn-primary">
                    <i class="fa fa-plus"></i> 新增费用单
                </a>
            </div>
        </div>
    </div>
    <div class="card-body">
        <!-- 筛选区域 -->
        <div class="row mb-3">
            <div class="col-md-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="搜索单号/供应商">
                </div>
            </div>
            <div class="col-md-2">
                <select class="form-select" id="categoryFilter">
                    <option value="">全部大类</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="date" class="form-control" id="dateFrom" placeholder="开始日期">
            </div>
            <div class="col-md-2">
                <input type="date" class="form-control" id="dateTo" placeholder="结束日期">
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-primary" id="btnSearch">
                    <i class="fa fa-search"></i> 搜索
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>单号</th>
                        <th>费用大类</th>
                        <th>供应商</th>
                        <th>总金额</th>
                        <th>明细数</th>
                        <th>日期</th>
                        <th>创建人</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <tr>
                        <td colspan="9" class="text-center text-muted">加载中...</td>
                    </tr>
                </tbody>
                <tfoot id="orderTableFoot" style="display:none;">
                    <tr class="table-info fw-bold">
                        <td colspan="4" class="text-end">合计</td>
                        <td id="totalAmountSum" class="text-end">¥0.00</td>
                        <td colspan="4"></td>
                    </tr>
                </tfoot>
            </table>
        </div>

        <nav aria-label="Page navigation" id="paginationNav" style="display:none;">
            <ul class="pagination justify-content-center" id="paginationList"></ul>
        </nav>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function() {
    var currentPage = 1;

    // 加载费用大类下拉
    $.get('{{ url_for("expense.categories") }}', function(res) {
        if (!res.success) return;
        var html = '<option value="">全部大类</option>';
        res.data.forEach(function(item) {
            html += '<option value="' + escapeHtml(item.dict_name) + '">' + escapeHtml(item.dict_name) + '</option>';
        });
        $('#categoryFilter').html(html);
    });

    // 加载列表
    function loadOrders(page) {
        currentPage = page;
        $.get('{{ url_for("expense.order_list") }}', {
            page: page,
            per_page: 10,
            search: $('#searchInput').val().trim(),
            category: $('#categoryFilter').val(),
            date_from: $('#dateFrom').val(),
            date_to: $('#dateTo').val()
        }, function(res) {
            if (!res.success) {
                showToast(res.message || '加载失败', 'danger');
                return;
            }
            var data = res.data;
            var items = data.items;
            var tbody = $('#orderTableBody');
            var tfoot = $('#orderTableFoot');

            if (items.length === 0) {
                tbody.html('<tr><td colspan="9" class="text-center text-muted"><i class="fa fa-inbox fa-2x mb-2"></i><p>暂无费用单</p></td></tr>');
                tfoot.hide();
                $('#paginationNav').hide();
                return;
            }

            var html = '';
            var amountSum = 0;
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var offset = (data.page - 1) * data.per_page;
                amountSum += item.total_amount;
                html += '<tr>' +
                    '<td>' + (offset + i + 1) + '</td>' +
                    '<td><a href="{{ url_for("expense.detail", order_id=0) }}'.replace('/0', '/' + item.order_id) + '" class="text-primary">' + escapeHtml(item.order_no) + '</a></td>' +
                    '<td><span class="badge bg-info">' + escapeHtml(item.expense_category) + '</span></td>' +
                    '<td>' + escapeHtml(item.vendor_name) + '</td>' +
                    '<td class="text-end fw-bold">¥' + item.total_amount.toFixed(2) + '</td>' +
                    '<td class="text-center">' + item.item_count + '</td>' +
                    '<td>' + item.order_date + '</td>' +
                    '<td>' + escapeHtml(item.create_by_name) + '</td>' +
                    '<td>' +
                        '<a href="{{ url_for("expense.detail", order_id=0) }}'.replace('/0', '/' + item.order_id) + '" class="btn btn-sm btn-outline-primary" title="查看详情"><i class="fa fa-eye"></i> 详情</a>' +
                    '</td>' +
                    '</tr>';
            }
            tbody.html(html);
            $('#totalAmountSum').text('¥' + amountSum.toFixed(2));
            tfoot.show();

            // 分页
            renderPagination('#paginationList', { current_page: data.page, total_pages: data.total_pages, total: data.total }, function(page) { loadOrders(page); });
        });
    }

    // 搜索
    bindSearch('searchInput', 'btnSearch', function() { loadOrders(1); });

    // 工具函数
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    window.loadOrders = loadOrders;
    loadOrders(1);
});
</script>
{% endblock %}
