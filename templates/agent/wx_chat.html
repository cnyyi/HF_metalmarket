{% extends "wx_base.html" %}

{% block title %}智能客服{% endblock %}

{% block content %}
<div style="display:flex;flex-direction:column;height:calc(100vh - 120px);padding:0;">
    <div id="messageArea" style="flex:1;overflow-y:auto;padding:16px;">
        <div id="welcomeArea" style="text-align:center;padding:40px 20px;color:var(--color-text-muted);">
            <i class="fas fa-robot" style="font-size:36px;color:var(--color-primary);margin-bottom:12px;display:block;"></i>
            <h4 style="color:var(--color-text);margin-bottom:8px;">智能客服</h4>
            <p style="font-size:13px;line-height:1.6;">我可以帮你查询合同、账单、水电费等信息，直接提问即可。</p>
        </div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid var(--color-border);background:var(--color-bg-card);">
        <div style="display:flex;gap:8px;align-items:flex-end;">
            <textarea id="messageInput" placeholder="输入你的问题..." rows="1" style="flex:1;border:1px solid var(--color-border);border-radius:8px;padding:8px 12px;font-size:14px;resize:none;min-height:38px;max-height:100px;font-family:inherit;background:var(--color-bg);color:var(--color-text);"></textarea>
            <button class="wx-btn" onclick="sendMessage()" id="sendBtn" style="flex-shrink:0;height:38px;padding:0 16px;">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
let currentConversationId = null;
let isLoading = false;

const textarea = document.getElementById('messageInput');
textarea.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
textarea.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('messageInput');
    const message = input.value.trim();
    if (!message) return;
    input.value = '';
    input.style.height = 'auto';

    appendMessage('user', message);
    showLoading();
    isLoading = true;

    $.ajax({
        url: '/agent/wx/chat/send',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ conversation_id: currentConversationId, message: message }),
        headers: {'X-CSRFToken': $('meta[name="csrf-token"]').attr('content')},
        success: function(resp) {
            hideLoading();
            isLoading = false;
            if (resp.success && resp.data && resp.data.content) {
                appendMessage('assistant', resp.data.content, resp.data);
                if (resp.data.conversation_id) currentConversationId = resp.data.conversation_id;
            } else if (!resp.success) {
                appendMessage('assistant', resp.message || '请求失败');
            }
            scrollToBottom();
        },
        error: function() {
            hideLoading();
            isLoading = false;
            appendMessage('assistant', '请求失败，请稍后重试。');
        }
    });
}

function appendMessage(role, content, data) {
    const area = document.getElementById('messageArea');
    const welcome = document.getElementById('welcomeArea');
    if (welcome) welcome.remove();

    const div = document.createElement('div');
    div.style.cssText = 'margin-bottom:12px;display:flex;' + (role === 'user' ? 'justify-content:flex-end;' : '');

    const bubble = document.createElement('div');
    bubble.style.cssText = 'max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;' +
        (role === 'user'
            ? 'background:var(--color-primary);color:#fff;border-bottom-right-radius:4px;'
            : 'background:var(--color-bg-card);border:1px solid var(--color-border);border-bottom-left-radius:4px;');

    if (role === 'assistant') {
        bubble.innerHTML = DOMPurify.sanitize(marked.parse(content || ''));
        var sql = (data && data.generated_sql) ? data.generated_sql : null;
        if (sql) {
            const sqlId = 'sql-' + Date.now();
            const sqlHtml = '<pre id="' + sqlId + '" style="background:#1e1e2e;color:#cdd6f4;padding:8px 12px;border-radius:6px;overflow-x:auto;margin:8px 0;font-size:12px;position:relative;"><button onclick="toggleSql(\'' + sqlId + '\')" style="position:absolute;top:4px;right:4px;background:rgba(255,255,255,0.1);border:none;color:#cdd6f4;padding:2px 6px;border-radius:4px;cursor:pointer;font-size:10px;">SQL</button><code>' + escapeHtml(sql) + '</code></pre>';
            bubble.innerHTML += DOMPurify.sanitize(sqlHtml);
        }
        if (data && data.chart) {
            var chartId = 'chart-' + Date.now();
            var chartDiv = document.createElement('div');
            chartDiv.id = chartId;
            chartDiv.style.cssText = 'width:100%;height:250px;margin:8px 0;';
            bubble.appendChild(chartDiv);
            setTimeout(function() { renderChart(chartId, data.chart); }, 100);
        }
        if (data && data.risks && data.risks.length > 0) {
            var risksDiv = document.createElement('div');
            risksDiv.style.cssText = 'margin:6px 0;';
            data.risks.forEach(function(r) {
                var tag = document.createElement('span');
                tag.style.cssText = 'display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px;' +
                    (r.level === 'high' ? 'background:#fee2e2;color:#dc2626;' : 'background:#fef3c7;color:#d97706;');
                tag.textContent = (r.level === 'high' ? '⚠️ ' : '⚡ ') + r.message;
                risksDiv.appendChild(tag);
            });
            bubble.appendChild(risksDiv);
        }
    } else {
        bubble.textContent = content;
    }

    div.appendChild(bubble);
    area.appendChild(div);
}

function toggleSql(id) {
    const pre = document.getElementById(id);
    const code = pre.querySelector('code');
    const btn = pre.querySelector('button');
    code.style.display = code.style.display === 'none' ? '' : 'none';
    btn.textContent = code.style.display === 'none' ? '展开' : 'SQL';
}

function showLoading() {
    const area = document.getElementById('messageArea');
    const div = document.createElement('div');
    div.id = 'loadingMsg';
    div.style.cssText = 'margin-bottom:12px;display:flex;';
    div.innerHTML = '<div style="padding:10px 14px;border-radius:12px;background:var(--color-bg-card);border:1px solid var(--color-border);border-bottom-left-radius:4px;"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--color-text-muted);animation:bounce 1.4s infinite ease-in-out both;margin:0 2px;"></span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--color-text-muted);animation:bounce 1.4s infinite ease-in-out both;margin:0 2px;animation-delay:0.16s;"></span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--color-text-muted);animation:bounce 1.4s infinite ease-in-out both;margin:0 2px;animation-delay:0.32s;"></span></div>';
    area.appendChild(div);
    scrollToBottom();
}

function hideLoading() {
    const el = document.getElementById('loadingMsg');
    if (el) el.remove();
}

function scrollToBottom() {
    const area = document.getElementById('messageArea');
    area.scrollTop = area.scrollHeight;
}

function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function renderChart(containerId, chartData) {
    var dom = document.getElementById(containerId);
    if (!dom || typeof echarts === 'undefined') return;
    var chart = echarts.init(dom);
    var option = { title: { text: chartData.title, left: 'center', textStyle: { fontSize: 13 } }, tooltip: { trigger: 'item' } };

    if (chartData.type === 'pie') {
        option.series = [{ type: 'pie', radius: ['40%', '70%'], data: chartData.data, label: { formatter: '{b}: ¥{c}' } }];
    } else if (chartData.type === 'line') {
        option.xAxis = { type: 'category', data: chartData.xAxis };
        option.yAxis = { type: 'value' };
        option.legend = { top: 30 };
        option.series = chartData.series.map(function(s) { return { name: s.name, type: 'line', data: s.data, smooth: true }; });
    } else if (chartData.type === 'bar') {
        option.xAxis = { type: 'category', data: chartData.xAxis };
        option.yAxis = { type: 'value' };
        option.series = chartData.series.map(function(s) { return { name: s.name, type: 'bar', data: s.data }; });
    }

    chart.setOption(option);
}
</script>
{% endblock %}
