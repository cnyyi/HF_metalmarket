{% extends "admin_base.html" %}

{% block title %}工资档案{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-chip">财务管理</span>
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<a href="{{ url_for('salary.profile') }}" class="breadcrumb-chip">工资管理</a>
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-current">工资档案</span>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="row">
            <div class="col-md-6">
                <h5 class="card-title mb-0">员工工资档案</h5>
            </div>
            <div class="col-md-6 text-end">
                <button type="button" class="btn btn-primary" id="btnAddProfile">
                    <i class="fa fa-plus"></i> 新建档案
                </button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="搜索姓名/用户名/电话">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select" id="statusFilter">
                    <option value="">全部状态</option>
                    <option value="有效">有效</option>
                    <option value="停用">停用</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-primary" id="btnSearch">
                    <i class="fa fa-search"></i> 搜索
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>员工姓名</th>
                        <th>用户名</th>
                        <th>电话</th>
                        <th>基本工资</th>
                        <th>岗位工资</th>
                        <th>补贴</th>
                        <th>社保</th>
                        <th>公积金</th>
                        <th>生效日期</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="profileTableBody">
                    <tr>
                        <td colspan="12" class="text-center text-muted">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav aria-label="Page navigation" id="paginationNav" style="display:none;">
            <ul class="pagination justify-content-center" id="paginationList"></ul>
        </nav>
    </div>
</div>

<!-- 新建/编辑档案弹窗 -->
<div class="modal fade" id="profileModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="profileModalTitle">
                    <i class="fa fa-plus-circle"></i> 新建工资档案
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="profileForm">
                    <input type="hidden" id="profileId">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">员工 <span class="text-danger">*</span></label>
                            <select class="form-select" id="userId">
                                <option value="">请选择员工</option>
                            </select>
                            <div class="form-text" id="userInfo"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">生效日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" id="effectiveDate" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">基本工资</label>
                            <div class="input-group">
                                <span class="input-group-text">¥</span>
                                <input type="number" class="form-control" id="baseSalary" value="0" step="0.01" min="0">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">岗位工资</label>
                            <div class="input-group">
                                <span class="input-group-text">¥</span>
                                <input type="number" class="form-control" id="postSalary" value="0" step="0.01" min="0">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">补贴</label>
                            <div class="input-group">
                                <span class="input-group-text">¥</span>
                                <input type="number" class="form-control" id="subsidy" value="0" step="0.01" min="0">
                            </div>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold">社保（个人部分）</label>
                            <div class="input-group">
                                <span class="input-group-text">¥</span>
                                <input type="number" class="form-control" id="insurance" value="0" step="0.01" min="0">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">公积金（个人部分）</label>
                            <div class="input-group">
                                <span class="input-group-text">¥</span>
                                <input type="number" class="form-control" id="housingFund" value="0" step="0.01" min="0">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-bold">状态</label>
                            <select class="form-select" id="profileStatus">
                                <option value="有效">有效</option>
                                <option value="停用">停用</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">备注</label>
                        <textarea class="form-control" id="description" rows="2" placeholder="选填"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="btnSaveProfile">
                    <i class="fa fa-save"></i> 保存
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(function() {
    let currentPage = 1;

    // 加载列表
    function loadProfiles(page) {
        currentPage = page || 1;
        $.get('/salary/profile/list', {
            page: currentPage,
            per_page: 10,
            search: $('#searchInput').val().trim(),
            status: $('#statusFilter').val()
        }, function(res) {
            if (!res.success) return alert(res.message);
            var data = res.data;
            var html = '';
            if (data.items.length === 0) {
                html = '<tr><td colspan="12" class="text-center text-muted">暂无数据</td></tr>';
            } else {
                data.items.forEach(function(item, idx) {
                    var statusBadge = item.status === '有效'
                        ? '<span class="badge bg-success">有效</span>'
                        : '<span class="badge bg-secondary">停用</span>';
                    html += '<tr>' +
                        '<td>' + ((currentPage-1)*10 + idx + 1) + '</td>' +
                        '<td>' + item.real_name + '</td>' +
                        '<td>' + item.username + '</td>' +
                        '<td>' + item.phone + '</td>' +
                        '<td class="text-end">¥' + item.base_salary.toFixed(2) + '</td>' +
                        '<td class="text-end">¥' + item.post_salary.toFixed(2) + '</td>' +
                        '<td class="text-end">¥' + item.subsidy.toFixed(2) + '</td>' +
                        '<td class="text-end">¥' + item.insurance.toFixed(2) + '</td>' +
                        '<td class="text-end">¥' + item.housing_fund.toFixed(2) + '</td>' +
                        '<td>' + item.effective_date + '</td>' +
                        '<td>' + statusBadge + '</td>' +
                        '<td>' +
                            '<button class="btn btn-sm btn-outline-primary me-1 btn-edit" data-id="' + item.profile_id + '"><i class="fa fa-edit"></i> 编辑</button>' +
                            '<button class="btn btn-sm btn-outline-danger btn-delete" data-id="' + item.profile_id + '"><i class="fa fa-trash"></i> 删除</button>' +
                        '</td></tr>';
                });
            }
            $('#profileTableBody').html(html);
            renderPagination('#paginationList', data, function(page) { loadProfiles(page); });
        });
    }

    // 搜索
    $('#btnSearch').click(function() { loadProfiles(1); });
    $('#searchInput').keypress(function(e) { if (e.which === 13) loadProfiles(1); });
    $('#statusFilter').change(function() { loadProfiles(1); });

    // 新建
    var isEdit = false;
    $('#btnAddProfile').click(function() {
        isEdit = false;
        $('#profileModalTitle').html('<i class="fa fa-plus-circle"></i> 新建工资档案');
        $('#profileForm')[0].reset();
        $('#profileId').val('');
        $('#profileStatus').val('有效');
        loadAvailableUsers();
        new bootstrap.Modal($('#profileModal')[0]).show();
    });

    function loadAvailableUsers() {
        $.get('/salary/profile/available_users', function(res) {
            if (!res.success) return;
            var html = '<option value="">请选择员工</option>';
            res.data.forEach(function(u) {
                html += '<option value="' + u.user_id + '">' + u.real_name + ' (' + u.username + ')' + (u.phone ? ' - ' + u.phone : '') + '</option>';
            });
            $('#userId').html(html);
        });
    }

    // 编辑
    $(document).on('click', '.btn-edit', function() {
        var id = $(this).data('id');
        isEdit = true;
        $('#profileModalTitle').html('<i class="fa fa-edit"></i> 编辑工资档案');
        // 先获取档案详情
        $.get('/salary/profile/list', { page: 1, per_page: 1000 }, function(res) {
            if (!res.success) return;
            var item = res.data.items.find(function(i) { return i.profile_id === id; });
            if (!item) return alert('档案不存在');
            $('#profileId').val(item.profile_id);
            $('#userId').html('<option value="' + item.user_id + '" selected>' + item.real_name + '</option>').prop('disabled', true);
            $('#baseSalary').val(item.base_salary);
            $('#postSalary').val(item.post_salary);
            $('#subsidy').val(item.subsidy);
            $('#insurance').val(item.insurance);
            $('#housingFund').val(item.housing_fund);
            $('#effectiveDate').val(item.effective_date);
            $('#profileStatus').val(item.status);
            $('#description').val(item.description);
            new bootstrap.Modal($('#profileModal')[0]).show();
        });
    });

    // 保存
    $('#btnSaveProfile').click(function() {
        var payload = {
            user_id: $('#userId').val(),
            base_salary: $('#baseSalary').val(),
            post_salary: $('#postSalary').val(),
            subsidy: $('#subsidy').val(),
            insurance: $('#insurance').val(),
            housing_fund: $('#housingFund').val(),
            effective_date: $('#effectiveDate').val(),
            status: $('#profileStatus').val(),
            description: $('#description').val()
        };

        var url, method;
        if (isEdit) {
            url = '/salary/profile/edit/' + $('#profileId').val();
            payload.status = $('#profileStatus').val();
            method = 'POST';
        } else {
            url = '/salary/profile/add';
            method = 'POST';
        }

        $.ajax({
            url: url,
            method: method,
            contentType: 'application/json',
            data: JSON.stringify(payload),
            headers: { 'X-CSRFToken': getCSRFToken() },
            success: function(res) {
                if (res.success) {
                    bootstrap.Modal.getInstance($('#profileModal')[0]).hide();
                    loadProfiles(currentPage);
                    showToast(res.message, 'success');
                } else {
                    alert(res.message);
                }
            },
            error: function(xhr) {
                alert(xhr.responseJSON ? xhr.responseJSON.message : '操作失败');
            }
        });
    });

    // 删除
    $(document).on('click', '.btn-delete', function() {
        var id = $(this).data('id');
        if (!confirm('确定要删除此工资档案吗？')) return;
        $.ajax({
            url: '/salary/profile/delete/' + id,
            method: 'POST',
            contentType: 'application/json',
            headers: { 'X-CSRFToken': getCSRFToken() },
            success: function(res) {
                if (res.success) {
                    loadProfiles(currentPage);
                    showToast(res.message, 'success');
                } else {
                    alert(res.message);
                }
            },
            error: function(xhr) {
                alert(xhr.responseJSON ? xhr.responseJSON.message : '删除失败');
            }
        });
    });

    // Toast 提示
    function showToast(msg, type) {
        var cls = type === 'success' ? 'bg-success' : 'bg-danger';
        var toast = $('<div class="toast align-items-center text-white ' + cls + ' border-0 position-fixed top-0 end-0 m-3" role="alert" style="z-index:9999">' +
            '<div class="d-flex"><div class="toast-body">' + msg + '</div>' +
            '<button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div></div>');
        $('body').append(toast);
        new bootstrap.Toast(toast[0], { delay: 2000 }).show();
        toast.on('hidden.bs.toast', function() { toast.remove(); });
    }

    // 初始加载
    loadProfiles(1);
});
</script>
{% endblock %}
