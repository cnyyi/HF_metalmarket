{% extends "admin_base.html" %}

{% block title %}应收账款{% endblock %}

{% block page_header %}
    <i class="fa fa-file-text-o"></i> 应收账款管理
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="row">
            <div class="col-md-6">
                <h5 class="card-title mb-0">应收账款列表</h5>
            </div>
            <div class="col-md-6 text-end">
                <button type="button" class="btn btn-primary">
                    <i class="fa fa-plus"></i> 添加应收账款
                </button>
                <button type="button" class="btn btn-success ms-2">
                    <i class="fa fa-file-excel-o"></i> 导出Excel
                </button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <!-- 搜索栏 -->
        <div class="row mb-3">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-search"></i></span>
                    <input type="text" class="form-control" placeholder="搜索商户名称">
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select">
                    <option value="">全部状态</option>
                    <option value="unpaid">未支付</option>
                    <option value="partial">部分支付</option>
                    <option value="paid">已支付</option>
                </select>
            </div>
            <div class="col-md-2">
                <button type="button" class="btn btn-primary">搜索</button>
            </div>
        </div>
        
        <!-- 数据表格 -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>商户名称</th>
                        <th>应收金额</th>
                        <th>已收金额</th>
                        <th>未收金额</th>
                        <th>到期日期</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="8" class="text-center text-muted">暂无数据</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <!-- 分页控件 -->
        <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center">
                <li class="page-item disabled">
                    <a class="page-link" href="#">上一页</a>
                </li>
                <li class="page-item active"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item">
                    <a class="page-link" href="#">下一页</a>
                </li>
            </ul>
        </nav>
    </div>
</div>
{% endblock %}
