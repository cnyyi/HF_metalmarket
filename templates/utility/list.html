{% extends "admin_base.html" %}

{% block title %}水电表管理 - 宏发金属交易市场管理系统{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4"><i class="fa fa-tachometer"></i> 水电表管理</h2>
            
            <div class="card">
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <div class="input-group">
                                <span class="input-group-text"><i class="fa fa-search"></i></span>
                                <select class="form-select" id="merchantFilter" style="width: 200px;">
                                    <option value="">全部商户</option>
                                </select>
                                <select class="form-select" id="typeFilter" style="width: 150px;">
                                    <option value="all">全部类型</option>
                                    <option value="water">水表</option>
                                    <option value="electricity">电表</option>
                                </select>
                                <button type="button" class="btn btn-primary" id="btnSearch">
                                    <i class="fa fa-search"></i> 查询
                                </button>
                                <button type="button" class="btn btn-secondary" id="btnReset">
                                    <i class="fa fa-undo"></i> 重置
                                </button>
                            </div>
                        </div>
                        <div class="col-md-8 text-end">
                            <button class="btn btn-primary" id="btnAddMeter" data-bs-toggle="modal" data-bs-target="#addMeterModal">
                                <i class="fa fa-plus"></i> 新增水电表
                            </button>
                        </div>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th style="width: 120px;">表编号</th>
                                    <th style="width: 80px;">类型</th>
                                    <th style="width: 80px;">倍率</th>
                                    <th>归属商户</th>
                                    <th style="width: 100px;">当前读数</th>
                                    <th style="width: 100px;">单价</th>
                                    <th style="width: 80px;">状态</th>
                                    <th style="width: 200px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="meterTableBody">
                                <tr>
                                    <td colspan="8" class="text-center text-muted">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

    <!-- 新增水电表模态窗口 -->
    <div class="modal fade" id="addMeterModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa fa-plus"></i> 新增水电表</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addMeterForm">
                        <div class="mb-3">
                            <label class="form-label">表编号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="meter_number" required placeholder="示例：S-001 (水表), D-001 (电表)">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">表类型 <span class="text-danger">*</span></label>
                            <select class="form-select" name="meter_type" required>
                                <option value="">请选择</option>
                                <option value="water">水表</option>
                                <option value="electricity">电表</option>
                            </select>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">倍率</label>
                                <input type="number" class="form-control" name="meter_multiplier" value="1" step="0.1" min="0">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">初始表底</label>
                                <input type="number" class="form-control" name="current_reading" value="0" step="0.01" min="0">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">安装日期 <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="installation_date" required id="installation_date">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="btnAddSave">
                        <i class="fa fa-save"></i> 保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑水电表模态窗口 -->
    <div class="modal fade" id="editMeterModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa fa-pencil"></i> 编辑水电表</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editMeterForm">
                        <input type="hidden" name="meter_id" id="edit_meter_id">
                        <input type="hidden" name="meter_type" id="edit_meter_type">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">表编号</label>
                                <input type="text" class="form-control" id="edit_meter_number" readonly style="background-color: #e9ecef;">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">类型</label>
                                <input type="text" class="form-control" id="edit_meter_type_display" readonly style="background-color: #e9ecef;">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label">倍率</label>
                                <input type="number" class="form-control" name="meter_multiplier" id="edit_meter_multiplier" step="0.1" min="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">单价 (元)</label>
                                <input type="number" class="form-control" name="unit_price" id="edit_unit_price" step="0.01" min="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">状态</label>
                                <select class="form-select" name="status" id="edit_status">
                                    <option value="正常">正常</option>
                                    <option value="停用">停用</option>
                                    <option value="故障">故障</option>
                                    <option value="报废">报废</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-8">
                                <label class="form-label">安装位置</label>
                                <input type="text" class="form-control" name="installation_location" id="edit_installation_location">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">关联合同</label>
                                <input type="text" class="form-control" id="edit_contract_info" readonly style="background-color: #e9ecef;">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">上次读数</label>
                                <input type="text" class="form-control" id="edit_last_reading" readonly style="background-color: #e9ecef;">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">当前读数</label>
                                <input type="text" class="form-control" id="edit_current_reading" readonly style="background-color: #e9ecef;">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="btnEditSave">
                        <i class="fa fa-save"></i> 保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 删除确认模态窗口 -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa fa-exclamation-triangle"></i> 确认删除</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>确定要删除这个水电表吗？</p>
                    <p class="text-danger"><strong>注意：</strong>删除后无法恢复！</p>
                    <input type="hidden" id="delete_meter_id">
                    <input type="hidden" id="delete_meter_type">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" id="btnDeleteConfirm">
                        <i class="fa fa-trash"></i> 删除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 水电表明细模态窗口 -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fa fa-info-circle"></i> 水电表明细</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detailContent">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script>

        // CSRF Token
        function getCSRFToken() {
            return $('meta[name="csrf-token"]').attr('content');
        }

        // 加载商户列表（不加载合同，合同在新增时加载）
        function loadMerchants() {
            $.ajax({
                url: '/utility/merchants',
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        let options = '<option value="">全部商户</option>';
                        response.data.forEach(function(m) {
                            options += `<option value="${m.merchant_id}">${m.merchant_name}</option>`;
                        });
                        $('#merchantFilter').html(options);
                    }
                }
            });
        }

        // 在模态框显示时设置默认值
        $('#addMeterModal').on('shown.bs.modal', function () {
            const now = new Date();
            const year = now.getFullYear();
            const defaultDate = `${year}-01-01`;
            $('#installation_date').val(defaultDate);
        });

        // 加载水电表列表
        function loadMeterList() {
            const merchantId = $('#merchantFilter').val();
            const meterType = $('#typeFilter').val();
            
            let url = '/utility/list_data?type=' + meterType;
            if (merchantId) {
                url += '&merchant_id=' + merchantId;
            }
            
            $.ajax({
                url: url,
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        renderMeterTable(response.data);
                    } else {
                        $('#meterTableBody').html('<tr><td colspan="8" class="text-center text-danger">加载失败</td></tr>');
                    }
                },
                error: function() {
                    $('#meterTableBody').html('<tr><td colspan="8" class="text-center text-danger">加载失败</td></tr>');
                }
            });
        }

        // 渲染表格
        function renderMeterTable(data) {
            const tbody = $('#meterTableBody');
            tbody.empty();
            
            if (data.length === 0) {
                tbody.html('<tr><td colspan="8" class="text-center text-muted">暂无数据</td></tr>');
                return;
            }
            
            data.forEach(function(item) {
                const typeText = item.meter_type === 'water' ? '水表' : '电表';
                const statusClass = item.status === '正常' ? 'bg-success' : 'bg-secondary';
                
                const row = `
                    <tr>
                        <td><a href="#" class="text-primary" onclick="showDetail(${item.meter_id}, '${item.meter_type}')">${item.meter_number}</a></td>
                        <td>${typeText}</td>
                        <td>${item.meter_multiplier}</td>
                        <td>${item.merchant_name || '-'}</td>
                        <td>${item.current_reading}</td>
                        <td>¥${parseFloat(item.unit_price).toFixed(2)}</td>
                        <td><span class="badge ${item.status === '正常' ? 'bg-success' : 'bg-secondary'}">${item.status}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="editMeter(${item.meter_id}, '${item.meter_type}')">
                                <i class="fa fa-pencil"></i> 编辑
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="confirmDelete(${item.meter_id}, '${item.meter_type}')">
                                <i class="fa fa-trash"></i> 删除
                            </button>
                            ${item.contract_id ? `<button class="btn btn-sm btn-outline-warning" onclick="unlinkMeter(${item.meter_id}, '${item.meter_type}')">
                                <i class="fa fa-unlink"></i> 解绑
                            </button>` : ''}
                        </td>
                    </tr>
                `;
                tbody.append(row);
            });
        }

        // 显示详情
        function showDetail(meterId, meterType) {
            $.ajax({
                url: `/utility/detail/${meterId}?type=${meterType}`,
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        const data = response.data;
                        const typeText = data.meter_type === 'water' ? '水表' : '电表';
                        const statusBadgeClass = data.status === '正常' ? 'bg-success' : (data.status === '故障' ? 'bg-danger' : (data.status === '停用' ? 'bg-warning' : 'bg-secondary'));
                        
                        const html = `
                            <div class="detail-info">
                                <table class="table table-bordered table-hover">
                                    <thead class="table-light">
                                        <tr>
                                            <th colspan="2" class="text-center"><i class="fa fa-info-circle"></i> 水电表详细信息</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr><th width="30%" class="bg-light">表编号</th><td><strong>${data.meter_number}</strong></td></tr>
                                        <tr><th class="bg-light">类型</th><td><span class="badge bg-primary">${typeText}</span></td></tr>
                                        <tr><th class="bg-light">倍率</th><td>${data.meter_multiplier}</td></tr>
                                        <tr><th class="bg-light">安装位置</th><td>${data.installation_location || '-'}</td></tr>
                                        <tr><th class="bg-light">单价</th><td class="text-primary"><strong>¥${parseFloat(data.unit_price).toFixed(2)}</strong></td></tr>
                                        <tr><th class="bg-light">上次读数</th><td>${data.last_reading}</td></tr>
                                        <tr><th class="bg-light">当前读数</th><td class="text-success"><strong>${data.current_reading}</strong></td></tr>
                                        <tr><th class="bg-light">状态</th><td><span class="badge ${statusBadgeClass}">${data.status}</span></td></tr>
                                        <tr><th class="bg-light">归属商户</th><td>${data.merchant_name || '-'}</td></tr>
                                        <tr><th class="bg-light">创建时间</th><td class="text-muted"><small>${data.create_time}</small></td></tr>
                                        <tr><th class="bg-light">更新时间</th><td class="text-muted"><small>${data.update_time}</small></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        `;
                        
                        $('#detailContent').html(html);
                        $('#detailModal').modal('show');
                    }
                }
            });
        }

        // 编辑水电表
        function editMeter(meterId, meterType) {
            $.ajax({
                url: `/utility/detail/${meterId}?type=${meterType}`,
                method: 'GET',
                success: function(response) {
                    if (response.success) {
                        const data = response.data;
                        
                        $('#edit_meter_id').val(data.meter_id);
                        $('#edit_meter_type').val(data.meter_type);
                        $('#edit_meter_number').val(data.meter_number);
                        $('#edit_meter_type_display').val(data.meter_type === 'water' ? '水表' : '电表');
                        $('#edit_meter_multiplier').val(data.meter_multiplier);
                        $('#edit_unit_price').val(data.unit_price);
                        $('#edit_installation_location').val(data.installation_location || '');
                        $('#edit_last_reading').val(data.last_reading);
                        $('#edit_current_reading').val(data.current_reading);
                        $('#edit_status').val(data.status);
                        $('#edit_contract_info').val(data.merchant_name || '未关联');
                        
                        $('#editMeterModal').modal('show');
                    }
                }
            });
        }

        // 确认删除
        function confirmDelete(meterId, meterType) {
            $('#delete_meter_id').val(meterId);
            $('#delete_meter_type').val(meterType);
            $('#deleteModal').modal('show');
        }

        // 执行删除
        $('#btnDeleteConfirm').click(function() {
            const meterId = $('#delete_meter_id').val();
            const meterType = $('#delete_meter_type').val();
            
            $.ajax({
                url: `/utility/delete/${meterId}`,
                method: 'POST',
                data: { meter_type: meterType },
                success: function(response) {
                    if (response.success) {
                        alert('删除成功');
                        $('#deleteModal').modal('hide');
                        loadMeterList();
                    } else {
                        alert('删除失败：' + response.message);
                    }
                },
                error: function() {
                    alert('删除失败');
                }
            });
        });

        // 解除关联
        function unlinkMeter(meterId, meterType) {
            if (!confirm('确定要解除这个水电表与合同的关联吗？')) {
                return;
            }
            
            $.ajax({
                url: `/utility/unlink/${meterId}`,
                method: 'POST',
                data: { meter_type: meterType },
                success: function(response) {
                    if (response.success) {
                        alert('解除关联成功');
                        loadMeterList();
                    } else {
                        alert('解除关联失败：' + response.message);
                    }
                },
                error: function() {
                    alert('解除关联失败');
                }
            });
        }

        // 新增保存
        $('#btnAddSave').click(function() {
            const formData = {
                meter_number: $('input[name="meter_number"]').val(),
                meter_type: $('select[name="meter_type"]').val(),
                meter_multiplier: parseFloat($('input[name="meter_multiplier"]').val()) || 1,
                current_reading: parseFloat($('input[name="current_reading"]').val()) || 0,
                installation_date: $('input[name="installation_date"]').val()
            };
            
            if (!formData.meter_number || !formData.meter_type || !formData.installation_date) {
                alert('请填写所有必填字段（表编号、表类型、安装日期）');
                return;
            }
            
            $.ajax({
                url: '/utility/create',
                method: 'POST',
                contentType: 'application/json',
                headers: {
                    'X-CSRFToken': getCSRFToken()
                },
                data: JSON.stringify(formData),
                success: function(response) {
                    if (response.success) {
                        alert('新增成功');
                        $('#addMeterModal').modal('hide');
                        loadMeterList();
                        $('#addMeterForm')[0].reset();
                    } else {
                        alert('新增失败：' + response.message);
                    }
                },
                error: function() {
                    alert('新增失败');
                }
            });
        });

        // 编辑保存
        $('#btnEditSave').click(function() {
            const formData = {
                meter_type: $('#edit_meter_type').val(),
                meter_multiplier: $('#edit_meter_multiplier').val(),
                unit_price: $('#edit_unit_price').val(),
                installation_location: $('#edit_installation_location').val(),
                status: $('#edit_status').val()
            };
            
            const meterId = $('#edit_meter_id').val();
            
            $.ajax({
                url: `/utility/edit/${meterId}`,
                method: 'POST',
                contentType: 'application/json',
                headers: {
                    'X-CSRFToken': getCSRFToken()
                },
                data: JSON.stringify(formData),
                success: function(response) {
                    if (response.success) {
                        alert('更新成功');
                        $('#editMeterModal').modal('hide');
                        loadMeterList();
                    } else {
                        alert('更新失败：' + response.message);
                    }
                },
                error: function() {
                    alert('更新失败');
                }
            });
        });

        // 换表复选框事件
        $('#isMeterChange').change(function() {
            if (this.checked) {
                $('#meterChangeSection').show();
            } else {
                $('#meterChangeSection').hide();
            }
        });

        // 查询和重置
        $('#btnSearch').click(loadMeterList);
        
        $('#btnReset').click(function() {
            $('#merchantFilter').val('');
            $('#typeFilter').val('all');
            loadMeterList();
        });

        // 页面加载时初始化
        $(document).ready(function() {
            loadMerchants();
            loadMeterList();
        });
    </script>
{% endblock %}
