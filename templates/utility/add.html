<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加水电表 - 宏发金属交易市场管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="#">宏发金属交易市场管理系统</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('auth.index') }}">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('user.user_list') }}">用户管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('merchant.merchant_list') }}">商户管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('plot.plot_list') }}">地块管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('contract.contract_list') }}">合同管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">水电计费</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('finance.finance_list') }}">财务管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('scale.scale_list') }}">磅秤管理</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <i class="fa fa-user"></i> 账户
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            {% if current_user.is_authenticated %}
                                <li><a class="dropdown-item" href="#">欢迎, {{ current_user.real_name }}</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="{{ url_for('user.change_password') }}">修改密码</a></li>
                                <li><a class="dropdown-item" href="{{ url_for('auth.logout') }}">登出</a></li>
                            {% else %}
                                <li><a class="dropdown-item" href="{{ url_for('auth.login') }}">登录</a></li>
                                <li><a class="dropdown-item" href="{{ url_for('auth.register') }}">注册</a></li>
                            {% endif %}
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <div class="row">
            <div class="col-md-12">
                <h2><i class="fa fa-plus"></i> 添加水电表</h2>
                <hr>
                
                <div class="card">
                    <div class="card-body">
                        <form method="POST">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">表编号</label>
                                    <input type="text" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">类型</label>
                                    <select class="form-select" required>
                                        <option value="">请选择类型</option>
                                        <option value="water">水表</option>
                                        <option value="electricity">电表</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">商户</label>
                                    <select class="form-select" required>
                                        <option value="">请选择商户</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">地块</label>
                                    <select class="form-select" required>
                                        <option value="">请选择地块</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">初始读数</label>
                                    <input type="number" step="0.01" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">安装日期</label>
                                    <input type="date" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">备注</label>
                                <textarea class="form-control" rows="3"></textarea>
                            </div>
                            <div class="text-end">
                                <a href="{{ url_for('utility.utility_list') }}" class="btn btn-secondary">取消</a>
                                <button type="submit" class="btn btn-primary">保存</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-4 bg-dark text-white">
        <div class="container text-center">
            <p>&copy; 2026 宏发金属交易市场管理系统. 保留所有权利.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
