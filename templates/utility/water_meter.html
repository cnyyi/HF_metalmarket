{% extends "admin_base.html" %}

{% block title %}水表抄表 - 宏发金属交易市场管理系统{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<a href="{{ url_for('utility.utility_list') }}" class="breadcrumb-chip">水电计费</a>
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-current">水表抄表</span>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-3">
                <label class="form-label fw-bold"><i class="fa fa-calendar-check"></i> 所属月份</label>
                <select class="form-select" id="belongMonth">
                    {% for opt in month_options %}
                    <option value="{{ opt.value }}" {% if opt.value == default_belong_month %}selected{% endif %}>{{ opt.label }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold"><i class="fa fa-calendar"></i> 抄表日期</label>
                <input type="date" class="form-control" id="readingDate" value="{{ default_reading_date }}">
            </div>
        </div>
        
        <div class="alert alert-info">
            <i class="fa fa-info-circle"></i> 请在下方录入各水表的当前读数，系统将自动计算用量和金额。
        </div>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th style="width: 100px;">表编号</th>
                        <th>归属商户</th>
                        <th style="width: 70px;">排序号</th>
                        <th style="width: 100px;">上次读数</th>
                        <th style="width: 120px;">本次读数</th>
                        <th style="width: 80px;">倍率</th>
                        <th style="width: 100px;">用量</th>
                        <th style="width: 100px;">单价</th>
                        <th style="width: 120px;">金额</th>
                        <th style="width: 60px;">确认</th>
                    </tr>
                </thead>
                <tbody id="meterTableBody">
                    <tr>
                        <td colspan="10" class="text-center text-muted">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="row mt-3">
            <div class="col-12 text-end">
                <button class="btn btn-outline-primary me-2" id="btnSaveSortOrder">
                    <i class="fa fa-sort-numeric-down"></i> 保存排序
                </button>
                <button class="btn btn-success" id="btnBatchSave">
                    <i class="fa fa-save"></i> 批量保存
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let meterData = [];

    // 加载待抄水表（按所属月份过滤已抄表记录）
    function loadMeters() {
        const belongMonth = $('#belongMonth').val();
        $.ajax({
            url: '/utility/water_meter_data',
            method: 'GET',
            data: { belong_month: belongMonth },
            success: function(response) {
                if (response.success) {
                    meterData = response.data;
                    renderTable();
                } else {
                    $('#meterTableBody').html('<tr><td colspan="10" class="text-center text-danger">加载失败</td></tr>');
                }
            },
            error: function() {
                $('#meterTableBody').html('<tr><td colspan="10" class="text-center text-danger">加载失败</td></tr>');
            }
        });
    }

    // 渲染表格
    function renderTable() {
        const tbody = $('#meterTableBody');
        tbody.empty();
        
        if (meterData.length === 0) {
            tbody.html('<tr><td colspan="10" class="text-center text-muted">暂无待抄水表</td></tr>');
            return;
        }
        
        meterData.forEach(function(item, index) {
            const multiplier = item.meter_multiplier || 1;
            const unitPrice = item.unit_price || 0;
            const lastReading = item.last_reading || 0;
            
            const row = `
                <tr>
                    <td>${item.meter_number}</td>
                    <td>${item.merchant_name}</td>
                    <td>
                        <input type="number" class="form-control form-control-sm sort-order-input"
                               data-index="${index}" data-contract-meter-id="${item.contract_meter_id}"
                               value="${item.sort_order || ''}" step="1" min="1" style="width: 65px;">
                    </td>
                    <td>${lastReading.toFixed(2)}</td>
                    <td>
                        <input type="number" class="form-control form-control-sm current-reading" 
                               data-index="${index}" step="0.01" min="${lastReading}" 
                               onchange="calculateUsage(${index})">
                    </td>
                    <td>${multiplier}</td>
                    <td class="usage-${index}">0.00</td>
                    <td class="unit-price-${index}">${unitPrice.toFixed(4)}</td>
                    <td class="amount-${index}">¥0.00</td>
                    <td>
                        <input type="checkbox" class="form-check-input confirm-check" data-index="${index}">
                    </td>
                </tr>
            `;
            tbody.append(row);
        });
    }

    // 计算用量和金额
    function calculateUsage(index) {
        const item = meterData[index];
        const currentReading = parseFloat($(`.current-reading[data-index="${index}"]`).val()) || 0;
        const lastReading = item.last_reading || 0;
        const multiplier = item.meter_multiplier || 1;
        const unitPrice = item.unit_price || 0;
        
        if (currentReading < lastReading) {
            showToast('warning', '当前读数不能小于上次读数');
            $(`.current-reading[data-index="${index}"]`).val('');
            return;
        }
        
        const usage = (currentReading - lastReading) * multiplier;
        const amount = usage * unitPrice;
        
        $(`.usage-${index}`).text(usage.toFixed(2));
        $(`.amount-${index}`).text('¥' + amount.toFixed(2));
    }

    // 保存排序号
    $('#btnSaveSortOrder').click(function() {
        const items = [];
        $('.sort-order-input').each(function() {
            const val = $(this).val().trim();
            const contractMeterId = $(this).data('contract-meter-id');
            if (val && contractMeterId) {
                items.push({
                    contract_meter_id: contractMeterId,
                    sort_order: parseInt(val)
                });
            }
        });
        if (items.length === 0) {
            showToast('warning', '未填写任何排序号');
            return;
        }
        ajaxPost('/utility/save_meter_sort_order', {
            meter_type: 'water',
            items: items
        }, function(res) {
            showToast('success', '排序保存成功，正在刷新...');
            setTimeout(function() { loadMeters(); }, 500);
        });
    });

    // 批量保存
    $('#btnBatchSave').click(function() {
        const readingDate = $('#readingDate').val();
        const belongMonth = $('#belongMonth').val();
        
        if (!readingDate) {
            showToast('warning', '请选择抄表日期');
            return;
        }
        
        if (!belongMonth) {
            showToast('warning', '请选择所属月份');
            return;
        }
        
        const readings = [];
        
        $('.current-reading').each(function() {
            const index = $(this).data('index');
            const currentReading = $(this).val();
            const confirmed = $(`.confirm-check[data-index="${index}"]`).is(':checked');
            
            if (currentReading && confirmed) {
                readings.push({
                    meter_id: meterData[index].meter_id,
                    current_reading: parseFloat(currentReading)
                });
            }
        });
        
        if (readings.length === 0) {
            showToast('warning', '请至少录入一条抄表数据并确认');
            return;
        }
        
        if (!confirm(`确定要提交 ${readings.length} 条抄表记录吗？\n抄表日期：${readingDate}\n所属月份：${$('#belongMonth option:selected').text()}`)) {
            return;
        }
        
        $.ajax({
            url: '/utility/water_meter_submit',
            method: 'POST',
            contentType: 'application/json',
            headers: {
                'X-CSRFToken': getCSRFToken()
            },
            data: JSON.stringify({ 
                reading_date: readingDate,
                belong_month: belongMonth,
                readings: readings 
            }),
            success: function(response) {
                if (response.success) {
                    showToast('success', response.message);
                    loadMeters();
                } else {
                    showToast('error', '提交失败：' + response.message);
                }
            },
            error: function() {
                showToast('error', '提交失败');
            }
        });
    });

    // 页面加载
    $(document).ready(function() {
        // 切换所属月份时重新加载数据
        $('#belongMonth').on('change', function() {
            loadMeters();
        });
        
        $('#readingDate').on('change', function() {
            const selectedDate = $(this).val();
            if (selectedDate) {
                const date = new Date(selectedDate);
                const today = new Date();
                
                if (date > today) {
                    showToast('warning', '抄表日期不能晚于今天');
                    const firstDayOfMonth = new Date(today.getFullYear(), today.getMonth(), 1);
                    $(this).val(firstDayOfMonth.toISOString().split('T')[0]);
                    return;
                }

                const prevMonth = new Date(date.getFullYear(), date.getMonth() - 1, 1);
                const year = prevMonth.getFullYear();
                const month = String(prevMonth.getMonth() + 1).padStart(2, '0');
                const belongMonthValue = year + '-' + month;

                const belongMonthSelect = $('#belongMonth');
                if (belongMonthSelect.find('option[value="' + belongMonthValue + '"]').length > 0) {
                    belongMonthSelect.val(belongMonthValue).trigger('change');
                } else {
                    loadMeters();
                }
            }
        });
        
        loadMeters();
    });
</script>
{% endblock %}
