{% extends "admin_base.html" %}

{% block title %}编辑水电表{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<a href="{{ url_for('utility.utility_list') }}" class="breadcrumb-chip">水电计费</a>
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-current">编辑水电表</span>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">表编号 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="meter_number" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">类型 <span class="text-danger">*</span></label>
                    <select class="form-select" name="meter_type" required>
                        <option value="">请选择类型</option>
                        <option value="water">水表</option>
                        <option value="electricity">电表</option>
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">商户</label>
                    <select class="form-select" name="merchant_id">
                        <option value="">请选择商户</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">地块</label>
                    <select class="form-select" name="plot_id">
                        <option value="">请选择地块</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">状态</label>
                <select class="form-select" name="status">
                    <option value="active">正常</option>
                    <option value="maintenance">维护中</option>
                    <option value="inactive">停用</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">备注</label>
                <textarea class="form-control" name="description" rows="3"></textarea>
            </div>
            <div class="text-end">
                <a href="{{ url_for('utility.utility_list') }}" class="btn btn-secondary">
                    <i class="fa fa-times"></i> 取消
                </a>
                <button type="submit" class="btn btn-primary">
                    <i class="fa fa-save"></i> 保存
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
