{% extends "admin_base.html" %}

{% block title %}商户列表{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<a href="{{ url_for('merchant.merchant_list') }}" class="breadcrumb-chip">商户管理</a>
<span class="breadcrumb-sep"><i class="fa fa-chevron-right"></i></span>
<span class="breadcrumb-current">商户列表</span>
{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="row">
            <div class="col-md-6">
                <h5 class="card-title mb-0">商户列表</h5>
            </div>
            <div class="col-md-6 text-end">
                <a href="{{ url_for('merchant.bind_requests') }}" class="btn btn-outline-info me-2">
                    <i class="fa fa-link"></i> 绑定审批
                </a>
                <a href="{{ url_for('merchant.add') }}" class="btn btn-primary">
                    <i class="fa fa-plus"></i> 添加商户
                </a>
            </div>
        </div>
    </div>
    <div class="card-body">
        <!-- 搜索栏 -->
        <div class="row mb-3 filter-form">
            <div class="col-md-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fa fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="搜索商户名称、联系人或电话">
                    <button type="button" class="btn btn-primary" id="btnSearch">搜索</button>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>商户名称</th>
                        <th>法人代表</th>
                        <th>联系人</th>
                        <th>联系电话</th>
                        <th>商户类型</th>
                        <th>业务类型</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="merchantTableBody">
                    <tr>
                        <td colspan="10" class="text-center text-muted">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页控件 -->
        <div class="row mt-3">
            <div class="col-md-4">
                <div id="pageInfo" class="text-muted"></div>
            </div>
            <div class="col-md-8 d-flex justify-content-end align-items-center">
                <button type="button" class="btn btn-sm btn-outline-secondary me-3" id="btnTogglePageSize">
                    <i class="fa fa-list"></i> <span id="togglePageSizeText">全部数据</span>
                </button>
                <nav aria-label="Page navigation">
                    <ul class="pagination justify-content-end mb-0" id="paginationList"></ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<!-- 门户管理弹窗 -->
<div class="modal fade" id="portalModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title"><i class="fa fa-globe"></i> 门户管理</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="portalModalBody">
                <p class="text-muted">加载中...</p>
            </div>
            <div class="modal-footer" id="portalModalFooter">
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var currentPage = 1;
var perPage = 12;
var showAll = false;
var totalCount = 0;

function loadMerchants(page) {
    if (!page) page = 1;
    currentPage = page;
    var search = $('#searchInput').val().trim();
    var params = { page: page, per_page: showAll ? 0 : perPage, search: search };

    $.ajax({
        url: '/merchant/api/list',
        type: 'GET',
        data: params,
        success: function(resp) {
            if (resp.success) {
                totalCount = resp.data.total_count;
                renderTable(resp.data);
                updatePageInfo();
            } else {
                $('#merchantTableBody').html('<tr><td colspan="10" class="text-center text-danger">' + (resp.message || '获取数据失败') + '</td></tr>');
            }
        },
        error: function() {
            $('#merchantTableBody').html('<tr><td colspan="10" class="text-center text-danger">网络错误</td></tr>');
        }
    });
}

function renderTable(data) {
    var items = data.items;
    var tbody = $('#merchantTableBody');
    if (!items || items.length === 0) {
        tbody.html('<tr><td colspan="10" class="text-center text-muted">暂无数据</td></tr>');
        $('#paginationList').closest('nav').hide();
        return;
    }
    var html = '';
    for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var rowNum = showAll ? (i + 1) : ((currentPage - 1) * perPage + i + 1);
        html += '<tr>';
        html += '<td>' + rowNum + '</td>';
        html += '<td>' + escapeHtml(item.merchant_name) + '</td>';
        html += '<td>' + escapeHtml(item.legal_person) + '</td>';
        html += '<td>' + escapeHtml(item.contact_person) + '</td>';
        html += '<td>' + escapeHtml(item.phone) + '</td>';
        html += '<td><span class="badge bg-primary">' + escapeHtml(item.merchant_type) + '</span></td>';
        html += '<td><span class="badge bg-info">' + escapeHtml(item.business_type || '未设置') + '</span></td>';
        html += '<td><span class="badge bg-success">' + escapeHtml(item.status) + '</span></td>';
        html += '<td>' + item.create_time + '</td>';
        html += '<td class="table-actions">';
        html += '<a href="/merchant/edit/' + item.merchant_id + '" class="btn btn-sm btn-warning" title="编辑"><i class="fa fa-edit"></i> 编辑</a> ';
        html += '<button class="btn btn-sm btn-outline-success btn-portal" title="门户管理" data-id="' + item.merchant_id + '" data-name="' + escapeHtml(item.merchant_name) + '"><i class="fa fa-globe"></i> 门户管理</button> ';
        html += '<a href="#" class="btn btn-sm btn-danger" title="删除" onclick="return confirm(\'确定要删除这个商户吗？\');"><i class="fa fa-trash"></i> 删除</a>';
        html += '</td></tr>';
    }
    tbody.html(html);
    if (!showAll) {
        $('#paginationList').closest('nav').show();
        renderPagination('#paginationList', data, function(page) { loadMerchants(page); });
    } else {
        $('#paginationList').closest('nav').hide();
    }
}

function updatePageInfo() {
    if (totalCount === 0) {
        $('#pageInfo').text('暂无数据');
    } else if (showAll) {
        $('#pageInfo').text('共 ' + totalCount + ' 条（全部显示）');
    } else {
        var start = (currentPage - 1) * perPage + 1;
        var end = Math.min(currentPage * perPage, totalCount);
        $('#pageInfo').text('显示 ' + start + '-' + end + ' 条，共 ' + totalCount + ' 条');
    }
}

$('#btnTogglePageSize').on('click', function() {
    showAll = !showAll;
    if (showAll) {
        $(this).removeClass('btn-outline-secondary').addClass('btn-secondary');
        $('#togglePageSizeText').text('分页显示');
    } else {
        $(this).removeClass('btn-secondary').addClass('btn-outline-secondary');
        $('#togglePageSizeText').text('全部数据');
        currentPage = 1;
    }
    loadMerchants(1);
});

$(document).ready(function() {
    loadMerchants(1);
    bindSearch('searchInput', 'btnSearch', function() { loadMerchants(1); });
});

// 门户管理弹窗
$(document).on('click', '.btn-portal', function() {
    var id = $(this).data('id');
    var name = $(this).data('name');
    $('#portalModalBody').html('<p class="text-muted">查询中...</p>');
    $('#portalModalFooter').html('');

    $.ajax({
        url: '/merchant/api/portal_status/' + id,
        type: 'GET',
        success: function(resp) {
            if (!resp.success) return;
            var d = resp.data;
            var html = '<h5>' + escapeHtml(name) + '</h5><hr>';

            if (d.enabled) {
                html += '<div class="mb-2"><span class="badge bg-success">已开通</span></div>';
                html += '<p><strong>用户名：</strong>' + escapeHtml(d.username) + '</p>';
                html += '<p><strong>最后登录：</strong>' + (d.last_login || '从未登录') + '</p>';

                $('#portalModalFooter').html(
                    '<button type="button" class="btn btn-warning" id="btnResetPwd" data-id="' + id + '"><i class="fa fa-key"></i> 重置密码</button>' +
                    '<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>'
                );
            } else {
                html += '<div class="mb-2"><span class="badge bg-secondary">未开通</span></div>';
                html += '<p class="text-muted">开通后商户可登录查看合同、缴费、过磅等数据</p>';
                html += '<div class="mb-3"><label class="form-label">自定义用户名（可选）</label>';
                html += '<input type="text" class="form-control" id="portalUsername" placeholder="默认: m_' + id + '"></div>';

                $('#portalModalFooter').html(
                    '<button type="button" class="btn btn-success" id="btnOpenPortal" data-id="' + id + '"><i class="fa fa-check"></i> 开通门户</button>' +
                    '<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>'
                );
            }
            $('#portalModalBody').html(html);
        }
    });

    new bootstrap.Modal(document.getElementById('portalModal')).show();
});

$(document).on('click', '#btnOpenPortal', function() {
    var id = $(this).data('id');
    var username = $('#portalUsername').val().trim();
    var btn = $(this);
    btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> 开通中...');

    $.ajax({
        url: '/merchant/api/open_portal/' + id,
        type: 'POST',
        contentType: 'application/json',
        headers: { 'X-CSRFToken': getCSRFToken() },
        data: JSON.stringify({ username: username || null }),
        success: function(resp) {
            if (resp.success) {
                var html = '<div class="alert alert-success"><i class="fa fa-check-circle"></i> 开通成功！</div>';
                html += '<p><strong>用户名：</strong><code>' + escapeHtml(resp.username) + '</code></p>';
                html += '<p><strong>初始密码：</strong><code>' + escapeHtml(resp.password) + '</code></p>';
                html += '<p class="text-muted"><small>请将账号信息告知商户，首次登录后建议修改密码</small></p>';
                $('#portalModalBody').html(html);
                $('#portalModalFooter').html('<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>');
            } else {
                alert(resp.message);
                btn.prop('disabled', false).html('<i class="fa fa-check"></i> 开通门户');
            }
        }
    });
});

$(document).on('click', '#btnResetPwd', function() {
    var id = $(this).data('id');
    if (!confirm('确定要重置该商户的门户密码吗？')) return;
    var btn = $(this);
    btn.prop('disabled', true).html('<i class="fa fa-spinner fa-spin"></i> 重置中...');

    $.ajax({
        url: '/merchant/api/reset_portal_password/' + id,
        type: 'POST',
        contentType: 'application/json',
        headers: { 'X-CSRFToken': getCSRFToken() },
        success: function(resp) {
            if (resp.success) {
                var html = '<div class="alert alert-success"><i class="fa fa-check-circle"></i> 密码重置成功！</div>';
                html += '<p><strong>新密码：</strong><code>' + escapeHtml(resp.password) + '</code></p>';
                html += '<p class="text-muted"><small>请将新密码告知商户</small></p>';
                $('#portalModalBody').html(html);
                $('#portalModalFooter').html('<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>');
            } else {
                alert(resp.message);
                btn.prop('disabled', false).html('<i class="fa fa-key"></i> 重置密码');
            }
        }
    });
});
</script>
{% endblock %}
